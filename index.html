<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>현장 품질 관리 시스템</title>
    <link rel="stylesheet" href="style.css?v=20260719">
</head>
<body>
    <!-- 로딩 오버레이 -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loader-container">
            <div class="loader"></div>
            <p id="loadingText">현장 데이터를 불러오는 중...</p>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast" class="toast"></div>

    <!-- 모바일 앱 컨테이너 -->
    <div class="dashboard-container">
        <!-- 헤더 영역 -->
        <header class="dashboard-header">
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">
                <h1 class="project-title" id="projectTitle" style="margin-bottom: 0;">현장명 로드 중...</h1>
                <button id="tempResetBtn" onclick="clearNoticeCache()" style="display: none; padding: 4px 8px; font-size: 11px; font-weight: 800; background: var(--danger); color: white; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.15s ease;">초기화</button>
            </div>
            <div class="project-date-badge" id="projectDate">시공일자 로드 중...</div>
            <div class="project-address" id="projectAddress">주소 로드 중...</div>
        </header>


        <!-- 기사님 선택 드롭다운 (동적 생성됨) -->
        <div class="worker-select-container">
            <span class="worker-select-icon">👷</span>
            <select id="workerTabs" class="worker-select">
                <!-- <option>홍길동 기사님</option> -->
            </select>
        </div>

        <main class="main-content">
            <!-- 1. 현장 공지사항 (아코디언 토글) -->
            <section class="content-card accordion-card">
                <button class="accordion-header" id="noticeHeader" onclick="toggleAccordion('noticeBody')">
                    <span class="header-title">📢 현장 공지/주의사항</span>
                    <span class="accordion-icon">▼</span>
                </button>
                <div class="accordion-body" id="noticeBody" style="display: none;">
                    <div class="notice-list-container" id="noticeList">
                        <!-- 동적으로 체크박스들이 들어감 -->
                    </div>

                    <button id="noticeReportBtn" class="notice-report-btn" onclick="submitNoticeConfirmation()" style="display: none;">📢 오늘 공지 확인 완료 보고</button>
                </div>

            </section>

            <!-- 2. 시공 품목 품질 점검 섹션 (동적 생성됨) -->
            <section class="section-title">
                <h2>🛠️ 시공 품목 품질 관리</h2>
            </section>
            
            <div id="taskListContainer">
                <!-- 각 품목별 체크리스트와 사진 업로드 카드가 동적 생성됨 -->
                <div class="empty-state">배정된 작업이 없습니다.</div>
            </div>
        </main>
    </div>

    <!-- 모달 팝업 (범용 확인창) -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p id="modalMessage">현재 점검 결과를 제출하시겠습니까?</p>
            <div class="modal-btns">
                <button class="modal-btn-cancel" onclick="closeModal(false)">취소</button>
                <button class="modal-btn-confirm" id="modalConfirmBtn">제출하기</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=20260719"></script>
</body>
</html>
